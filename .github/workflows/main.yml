name: Production

on:
  push:
    branches: [main]
  workflow_call:
    inputs:
      skip_promote:
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read
  security-events: write

jobs:
  ui-checks:
    name: UI Checks
    if: github.event_name == 'push'
    uses: ./.github/workflows/ui.yml
    with:
      skip_promote: true

  security:
    name: Security Audit
    if: github.event_name == 'push'
    uses: ./.github/workflows/security.yml

