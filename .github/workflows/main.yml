name: Production

on:
  push:
    branches: [ui, main]
  workflow_call:
    inputs:
      skip_promote:
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sundays at midnight UTC

permissions:
  contents: write
jobs:
  display-context:
    runs-on: ubuntu-latest
    steps:
      - name: Display context
        run: |
          echo "Running inside of main.yml"
          echo "github.ref: ${{ github.ref }}"
          echo "github.ref_name: ${{ github.ref_name }}"
          echo "github.event_name: ${{ github.event_name }}"
          echo "skip_promote: ${{ inputs.skip_promote }}"

  ui-checks:
    name: UI Checks
    if: github.event_name == 'push'
    uses: ./.github/workflows/ui.yml
    with:
      skip_promote: true

