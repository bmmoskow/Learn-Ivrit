name: Integration

on:
  push:
    branches: [integration]
  workflow_call:
    inputs:
      skip_promote:
        required: false
        type: boolean
        default: false

permissions:
  contents: write
jobs:
  display-context:
    runs-on: ubuntu-latest
    steps:
      - name: Display context
        run: |
          echo "Running inside of integration.yml"
          echo "github.ref: ${{ github.ref }}"
          echo "github.ref_name: ${{ github.ref_name }}"
          echo "github.event_name: ${{ github.event_name }}"
          echo "skip_promote: ${{ inputs.skip_promote }}"

  development-checks:
    name: Development Checks
    uses: ./.github/workflows/development.yml
    with:
      skip_promote: true

#  integration-tests:
