#          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
  display-branch-inside-intgration:
    runs-on: ubuntu-latest
    steps:
      - name: Display current branch name inside integration
        run:
          echo "Running inside of integration.yml"
          echo "The current branch name is ${{ github.ref }}"
          echo "The current branch name is ${{ github.ref_name }}"
          echo "The current branch name is ${{ inputs.skip_promote }}"

  promote-to-ui:
    name: Promote to UI
    runs-on: ubuntu-latest
    needs: [development-checks]
    #    needs: [development-checks, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/integration' && inputs.skip_promote != true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge to ui
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin ui:ui
          git checkout ui
          git merge --no-ff origin/integration -m "Auto-promote from integration to ui"
          git push origin ui
