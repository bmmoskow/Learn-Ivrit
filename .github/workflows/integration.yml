  promote-to-ui:
    name: Promote to UI
    runs-on: ubuntu-latest
#    needs: [development-checks, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/integration'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge to ui
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin ui:ui
          git checkout ui
          git merge --no-ff origin/integration -m "Auto-promote from integration to ui"
          git push origin ui
