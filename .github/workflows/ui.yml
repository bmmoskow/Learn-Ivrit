  promote-to-main:
    name: Promote to Main
    runs-on: ubuntu-latest
    needs: [integration-checks]
#    needs: [integration-checks, e2e-tests, deep-security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/ui'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main:main
          git checkout main
          git merge --no-ff origin/ui -m "Auto-promote from ui to main"
          git push origin main
