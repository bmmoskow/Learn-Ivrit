  display-branch-inside-development:
    runs-on: ubuntu-latest
    steps:
      - name: Display current branch name inside development
        run:
          echo "Running inside of development.yml"
          echo "The current branch name is ${{ github.ref }}"
          echo "The current branch name is ${{ github.ref_name }}"

  promote-to-integration:
    name: Promote to Integration
    runs-on: ubuntu-latest
    needs: [base-checks]
#    needs: [base-checks, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge to integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin integration:integration
          git checkout integration
          git merge --no-ff origin/development -m "Auto-promote from development to integration"
          git push origin integration
