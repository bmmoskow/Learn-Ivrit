name: Development

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]
  workflow_call:
    inputs:
      skip_promote:
        required: false
        type: boolean
        default: false

permissions:
  contents: write
jobs:
  display-context:
    runs-on: ubuntu-latest
    steps:
      - name: Display context
        run: |
          echo "Running inside of development.yml"
          echo "github.ref: ${{ github.ref }}"
          echo "github.ref_name: ${{ github.ref_name }}"
          echo "github.event_name: ${{ github.event_name }}"
          echo "skip_promote: ${{ inputs.skip_promote }}"

  base-checks:
    name: Base Checks
    uses: ./.github/workflows/base-checks.yml
    with:
      skip_promote: true

#  unit-tests:
#    name: Unit Tests
#    runs-on: ubuntu-latest
#    needs: base-checks
#    environment: development
#    steps:
#      - name: Checkout code
#        uses: actions/checkout@v4
#
#      - name: Setup Node.js
#        uses: actions/setup-node@v4
#        with:
#          node-version: '20'
#          cache: 'npm'
#
#      - name: Install dependencies
#        run: npm ci
#
#      - name: Run unit tests
#        run: npm run test:unit

  promote-to-integration:
    name: Promote to Integration
    runs-on: ubuntu-latest
    needs: [base-checks]
    #    needs: [base-checks, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/development' && inputs.skip_promote != true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Merge to integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin integration:integration
          git checkout integration
          git merge --no-ff origin/development -m "Auto-promote from development to integration"
          git push origin integration
